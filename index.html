<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>학교 급식실 대체인력 근무 확인서</title>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; padding: 20px; line-height: 1.6; background-color: #f0f2f5; color: #333; -webkit-text-size-adjust: none; }
        .container { max-width: 500px; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); margin: auto; }
        h2 { text-align: center; color: #2c3e50; margin-bottom: 25px; border-bottom: 2px solid #4CAF50; padding-bottom: 10px; }
        label { display: block; margin-top: 15px; font-weight: bold; color: #555; }
        input[type="text"] { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        
        .time-options { margin-top: 10px; display: grid; gap: 8px; }
        .time-item { display: flex; align-items: center; background: #f9f9f9; padding: 10px; border-radius: 8px; border: 1px solid #eee; cursor: pointer; font-size: 15px; }
        .time-item input { margin-right: 10px; width: 18px; height: 18px; }
        #etcTimeInput { margin-top: 5px; display: none; }

        .signature-group { margin-top: 20px; padding: 15px; border: 1px dashed #ccc; border-radius: 10px; background: #fff; }
        .signature-wrapper { border: 1px solid #333; background: #fff; margin-top: 10px; width: 100%; height: 150px; border-radius: 5px; position: relative; overflow: hidden; }
        
        /* 터치 간섭 완전 차단 */
        canvas { position: absolute; left: 0; top: 0; width: 100% !important; height: 100% !important; touch-action: none; }
        
        .btns { margin-top: 30px; display: flex; gap: 10px; }
        button { flex: 1; padding: 15px; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; transition: 0.3s; }
        .btn-save { background-color: #4CAF50; color: white; }
        .btn-clear { background-color: #999; color: white; }
    </style>
</head>
<body>

<div class="container">
    <h2>급식실 근무 확인서</h2>
    
    <label>1. 근무자 성명</label>
    <input type="text" id="userName" placeholder="성함을 입력하세요">

    <label>2. 근무 시간 선택</label>
    <div class="time-options">
        <label class="time-item"><input type="radio" name="workTime" value="07:30~15:30" onclick="toggleEtc(false)"> 07:30 ~ 15:30</label>
        <label class="time-item"><input type="radio" name="workTime" value="08:00~16:00" onclick="toggleEtc(false)"> 08:00 ~ 16:00</label>
        <label class="time-item"><input type="radio" name="workTime" value="08:30~16:30" onclick="toggleEtc(false)"> 08:30 ~ 16:30</label>
        <label class="time-item"><input type="radio" name="workTime" value="etc" id="etcRadio" onclick="toggleEtc(true)"> 기타 (직접 입력)</label>
        <input type="text" id="etcTimeInput" placeholder="근무 시간을 입력하세요">
    </div>

    <div class="signature-group">
        <label>3. 근무자 서명</label>
        <div class="signature-wrapper">
            <canvas id="user-pad"></canvas>
        </div>
        <button type="button" class="btn-clear" style="padding:5px; margin-top:5px; font-size:12px;" onclick="userPad.clear()">서명 지우기</button>
    </div>

    <div class="signature-group" style="background-color: #e8f5e9;">
        <label>4. 현장 확인자 (조리사 서명)</label>
        <div class="signature-wrapper">
            <canvas id="admin-pad"></canvas>
        </div>
        <button type="button" class="btn-clear" style="padding:5px; margin-top:5px; font-size:12px;" onclick="adminPad.clear()">서명 지우기</button>
    </div>
    
    <div class="btns">
        <button class="btn-save" onclick="saveData()">확인 및 제출하기</button>
    </div>
</div>

<script>
    const userCanvas = document.getElementById('user-pad');
    const adminCanvas = document.getElementById('admin-pad');
    
    // 캔버스 크기 초기화 함수 (단순화)
    function initCanvas(canvas) {
        const ratio = Math.max(window.devicePixelRatio || 1, 1);
        canvas.width = canvas.offsetWidth * ratio;
        canvas.height = canvas.offsetHeight * ratio;
        canvas.getContext("2d").scale(ratio, ratio);
    }

    // 초기 설정
    initCanvas(userCanvas);
    initCanvas(adminCanvas);

    const userPad = new SignaturePad(userCanvas, { backgroundColor: 'rgb(255, 255, 255)' });
    const adminPad = new SignaturePad(adminCanvas, { backgroundColor: 'rgb(255, 255, 255)' });

    function toggleEtc(show) {
        document.getElementById('etcTimeInput').style.display = show ? 'block' : 'none';
    }

    async function saveData() {
        const name = document.getElementById('userName').value;
        const selectedTime = document.querySelector('input[name="workTime"]:checked');
        let workTime = selectedTime ? selectedTime.value : "";
        
        if(workTime === "etc") {
            workTime = document.getElementById('etcTimeInput').value;
        }

        if (!name || !workTime || userPad.isEmpty() || adminPad.isEmpty()) {
            alert("성명, 시간 선택, 그리고 양측 서명을 모두 완료해주세요.");
            return;
        }

        const btn = document.querySelector('.btn-save');
        btn.innerText = "전송 중...";
        btn.disabled = true;

        const data = {
            name: name,
            time: workTime,
            userSig: userPad.toDataURL(),
            adminSig: adminPad.toDataURL(),
            timestamp: new Date().toLocaleString()
        };

        const URL = "https://script.google.com/macros/s/AKfycbyCvOkrAlmv4xNVIWhLvDJszItOvKfZzh5tBuX0oas5Hrv1QrsvE0fYaRtOiggYCfemPA/exec";

        try {
            await fetch(URL, { method: "POST", mode: "no-cors", body: JSON.stringify(data) });
            alert("제출되었습니다. 오늘도 잘 부탁드립니다!");
            location.reload();
        } catch (e) {
            alert("오류 발생! 다시 시도해주세요.");
            btn.disabled = false;
            btn.innerText = "확인 및 제출하기";
        }
    }
</script>

</body>
</html>
